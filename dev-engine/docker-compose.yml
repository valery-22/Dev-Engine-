version: '3.9'
services:
  backend:
    build: ./infra
    ports: ["8000:8000"]
    env_file: .env
    depends_on: [db, qdrant]
    volumes: ["./apps/backend:/app"]

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: devengine
    volumes: ["postgres_data:/var/lib/postgresql/data"]

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
    volumes: ["qdrant_data:/qdrant/storage"]

volumes:
  postgres_data:
  qdrant_data: